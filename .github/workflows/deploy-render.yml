name: Deploy Render

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Missing secret RENDER_API_KEY"
            exit 1
          fi

          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing variable RENDER_SERVICE_ID"
            exit 1
          fi

          response=$(curl -fsSL \
            -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear","deployMode":"build_and_deploy"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          printf '%s' "$response" > render-deploy.json
          deploy_id=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('render-deploy.json','utf8')); process.stdout.write(data.id || '')")

          if [ -z "$deploy_id" ]; then
            echo "Render deploy id not found"
            cat render-deploy.json
            exit 1
          fi

          echo "RENDER_DEPLOY_ID=$deploy_id" >> "$GITHUB_ENV"

      - name: Wait for Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          for attempt in $(seq 1 30); do
            response=$(curl -fsSL \
              -H "Accept: application/json" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$RENDER_DEPLOY_ID")

            printf '%s' "$response" > render-status.json
            status=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('render-status.json','utf8')); process.stdout.write(data.status || '')")

            echo "Render status: $status"

            if [ "$status" = "live" ]; then
              exit 0
            fi

            case "$status" in
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deployment failed with status $status"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Render deployment timed out"
          exit 1

      - name: Verify Render URL
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Missing variable RENDER_HEALTH_URL"
            exit 1
          fi

          for attempt in $(seq 1 12); do
            status=$(curl -sS -o render-health.txt -w "%{http_code}" "$RENDER_HEALTH_URL" || true)
            if [ "$status" = "200" ]; then
              echo "Render health OK at $RENDER_HEALTH_URL"
              cat render-health.txt
              exit 0
            fi
            sleep 10
          done

          echo "Render health check failed for $RENDER_HEALTH_URL"
          exit 1

name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app for Pages
        run: npm run build -- --base-href "/fittrack-front/"

      - name: Add SPA fallback
        run: cp dist/fittrack-front/browser/index.html dist/fittrack-front/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/fittrack-front/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify Pages home page
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          for attempt in $(seq 1 12); do
            body=$(curl -fsSL "$PAGE_URL" || true)
            if echo "$body" | grep -q "<title>FitTrack</title>"; then
              echo "Pages OK at $PAGE_URL"
              exit 0
            fi
            sleep 10
          done

          echo "Pages verification failed for $PAGE_URL"
          exit 1
